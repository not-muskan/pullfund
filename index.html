<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PullFund - Startup Ecosystem Directory</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="container header">
      <div>
        <h1>PullFund</h1>
        <p class="subtitle">Discover incubators, accelerators, grants, and VC funds</p>
      </div>
    </header>

    <main class="container">
      <div class="app-layout">
        <aside class="filters-sidebar">
          <div class="filter-group">
            <label for="sectorFilter">Sectors</label>
            <select id="sectorFilter" multiple size="14"></select>
          </div>
        </aside>

        <div class="content-area">
          <section class="controls">
            <div class="scope-tabs" role="tablist" aria-label="Market scope tabs">
              <button class="scope-tab active" data-scope="Global">Global</button>
              <button class="scope-tab" data-scope="India">India</button>
              <button class="scope-tab" data-scope="All">All</button>
            </div>

            <div class="tabs" role="tablist" aria-label="Entity category tabs">
              <button class="tab active" data-type="All">All</button>
              <button class="tab" data-type="Incubator">Incubators</button>
              <button class="tab" data-type="Accelerator">Accelerators</button>
              <button class="tab" data-type="Grants">Grants</button>
              <button class="tab" data-type="VC">VC Funds</button>
            </div>

            <div class="search-wrap">
              <input id="searchInput" type="search" placeholder="Search programs or funds..." />
            </div>
          </section>

          <section>
            <div class="section-head">
              <h2>Directory</h2>
              <p id="resultCount"></p>
            </div>
            <div id="entityList" class="entity-grid"></div>
          </section>

        </div>
      </div>
    </main>

    <template id="entityCardTemplate">
      <article class="card">
        <h3 class="entity-name"></h3>
        <p class="entity-meta"></p>
        <p class="entity-description"></p>
        <div class="tags"></div>
        <div class="actions">
          <a class="apply-link" target="_blank" rel="noopener noreferrer">Apply Now</a>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
