<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PullFund Admin Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="container header">
      <div>
        <h1>PullFund Admin</h1>
        <p class="subtitle">Verification and data quality dashboard</p>
      </div>
    </header>

    <main class="container">
      <section class="controls">
        <div class="section-head">
          <h2>Data Verification</h2>
          <p id="adminCount"></p>
        </div>
        <p id="verificationRunMeta" class="subtitle"></p>
        <div class="search-wrap">
          <input id="adminSearch" type="search" placeholder="Search entity name..." />
        </div>
      </section>

      <section class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Verification</th>
              <th>Run Result</th>
              <th>Status</th>
              <th>Last Checked</th>
              <th>Last Verified</th>
              <th>Issues</th>
              <th>Source</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
